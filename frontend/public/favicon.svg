<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#1e293b"/>
  
  <!-- Construction Helmet -->
  <!-- Helmet main body -->
  <path d="M 20 50 Q 20 30 50 25 Q 80 30 80 50 L 75 65 Q 75 70 70 70 L 30 70 Q 25 70 25 65 Z" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  
  <!-- Helmet brim/bill -->
  <ellipse cx="50" cy="65" rx="28" ry="8" fill="#d97706"/>
  <path d="M 25 65 Q 20 68 22 75 L 78 75 Q 80 68 75 65 Z" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  
  <!-- Helmet visor opening -->
  <ellipse cx="50" cy="48" rx="18" ry="12" fill="#0f172a" opacity="0.7"/>
  
  <!-- Front accent/stripe -->
  <rect x="48" y="30" width="4" height="35" fill="#f59e0b" opacity="0.5"/>
  
  <!-- Helmet highlights for 3D effect -->
  <path d="M 30 35 Q 35 32 40 33" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Small circular emblem in center -->
  <circle cx="50" cy="50" r="4" fill="#fbbf24" opacity="0.9"/>
</svg>
